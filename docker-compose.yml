services:
  repo-dashboard:
    build: .
    container_name: repo-dashboard
    ports:
      - "8787:8787"
    environment:
      # These are interpolated from --env-file (e.g. ~/.env) at `up` time.
      # If GITHUB_TOKEN is unset, the server falls back to `gh auth token`.
      # On Linux, gh stores the token in the system keyring (not the config
      # file), so the container's gh cannot reach it. Easiest fix:
      #   export GITHUB_TOKEN=$(gh auth token)   # then docker compose up
      # Or use the npm wrapper: npm run docker:up
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      DEFAULT_INACTIVITY_DAYS: ${DEFAULT_INACTIVITY_DAYS:-7}
      PORT: 8787
      DATA_DIR: /data
    volumes:
      # SQLite DB persists here on the host across container rebuilds
      - ./data:/data
    restart: unless-stopped
